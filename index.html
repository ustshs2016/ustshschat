<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pier - UST SHS Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ust-teal: #008080;
            --ust-gold: #FFD700;
        }
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .chat-container { height: 500px; max-height: 70vh; }
        .bg-teal-ust { background-color: var(--ust-teal); }
        .text-teal-ust { color: var(--ust-teal); }
        .message-bubble { max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--ust-teal); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-teal-ust p-4 flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-teal-ust font-bold shadow-sm">P</div>
            <div>
                <h1 class="text-white font-bold text-lg leading-tight">Pier</h1>
                <p class="text-gold-ust text-xs font-medium uppercase tracking-wider">Veritas in Caritate</p>
            </div>
        </div>

        <div id="chat-window" class="chat-container overflow-y-auto p-4 flex flex-col gap-4">
            <div class="message-bubble bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-none self-start shadow-sm">
                <p class="text-sm">Greetings, Tiger! 🐯 I am Pier. Once you add your fresh API key to the code, I'll be ready to help you!</p>
            </div>
        </div>

        <div class="p-4 bg-gray-50 border-t border-gray-200">
            <div class="flex gap-2">
                <input type="text" id="user-input" class="flex-1 p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" placeholder="Type a message...">
                <button onclick="sendMessage()" class="bg-teal-ust hover:bg-teal-900 text-white p-3 rounded-xl transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * STEP 1: GENERATE A NEW KEY
         * 1. Go to Google AI Studio and delete your old key.
         * 2. Create a NEW API Key.
         * 3. Go to Google Cloud Console > Credentials and select your new key.
         * 4. Under 'Website restrictions', add: https://rpescalona17.github.io/*
         * 5. Split your new key below to hide it from GitHub's scanner.
         */
        const part1 = "AIzaSyB8rYExVEZ"; 
        const part2 = "8-dVvefO92Z3Otq-ULjDoovM";
        const apiKey = part1 + part2; 

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        const systemPrompt = `You are Pier, a virtual assistant for UST SHS. Core values: Competence, Commitment, Compassion. Patron: Bl. Pier Giorgio Frassati. Tonality: Thomasian, polite, uses tiger emojis.`;

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || apiKey.includes("REPLACE")) return;

            appendMessage(message, 'user');
            userInput.value = '';
            const loadingId = addLoadingIndicator();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                const data = await response.json();
                removeLoadingIndicator(loadingId);

                if (data.error) {
                    throw new Error(data.error.message);
                }
                
                appendMessage(data.candidates[0].content.parts[0].text, 'bot');
            } catch (error) {
                removeLoadingIndicator(loadingId);
                appendMessage(`Error: ${error.message}. Check your Cloud Console restrictions!`, 'bot');
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message-bubble bg-teal-ust text-white p-3 rounded-2xl rounded-tr-none self-end' : 'message-bubble bg-white text-gray-800 p-3 rounded-2xl rounded-tl-none self-start border border-gray-200';
            div.innerHTML = `<p class="text-sm">${text}</p>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addLoadingIndicator() {
            const id = 'loader-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'self-start flex items-center gap-2 p-2';
            div.innerHTML = `<div class="loader"></div>`;
            chatWindow.appendChild(div);
            return id;
        }

        function removeLoadingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
